<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room — Tbil Inn</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="padding-bottom:70px;">

  <nav id="desktop-nav" class="scrolled">
    <a href="index.html" class="desktop-logo">Tbil Inn</a>
    <div class="desktop-links"><a href="index.html">← Back to Home</a></div>
  </nav>

  <div class="hero-slider-wrapper">
    <div class="mobile-hero-slides">
      <div class="mobile-hero-slide">
        <img id="room-cover" src="" alt="">
        <div class="slide-overlay"></div>
        <div class="mobile-hero-info">
          <h1 class="mobile-hero-name" id="room-title">Loading...</h1>
          <span class="mobile-hero-type" id="room-sub"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="mobile-booking-bar">
    <div class="mobile-bar-price">
      <span class="amount" id="mobile-price">-</span><span class="per">per night</span>
    </div>
    <button class="mobile-bar-btn">Reserve</button>
  </div>

  <main>
    <div class="room-content">
      <div class="room-main-col">
        <div class="room-meta-row">
          <div class="room-meta-item"><span class="material-symbols-outlined">straighten</span><span id="room-area">-</span></div>
          <div class="room-meta-item"><span class="material-symbols-outlined">king_bed</span><span id="room-bed">-</span></div>
          <div class="room-meta-item"><span class="material-symbols-outlined">people</span><span id="room-guests">-</span></div>
        </div>
        <div>
          <h2 class="room-section-title" id="room-highlight"></h2>
          <p class="room-text" id="room-desc"></p>
        </div>
        <div class="amenities-block">
          <span class="room-section-label">Amenities</span>
          <div class="amenities-grid" id="amenities-list"></div>
        </div>
      </div>

      <div class="room-sidebar-col">
        <aside class="booking-card">
          <div class="booking-card-header">
            <div class="booking-price"><span class="currency">$</span><span class="amount" id="side-price">-</span><span class="per">/ night</span></div>
          </div>
          <div class="booking-form"><button class="btn-reserve">Reserve Now</button></div>
        </aside>
      </div>
    </div>
  </main>

  <script type="module">
    import { db, doc, getDoc, currentLang } from './main.js';

    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('id');

    async function loadRoom() {
      if (!roomId) return;
      const snap = await getDoc(doc(db, "rooms", roomId));
      if (snap.exists()) {
        const d = snap.data();
        const t = d.langs[currentLang];

        document.title = `${t.name} — Tbil Inn`;
        document.getElementById('room-cover').src = d.cover;
        document.getElementById('room-title').textContent = t.name;
        document.getElementById('room-sub').textContent = t.sub;
        document.getElementById('room-desc').textContent = t.desc;
        document.getElementById('room-highlight').textContent = t.highlight;

        document.getElementById('room-area').textContent = `${d.area} m²`;
        document.getElementById('room-bed').textContent = d.bed;
        document.getElementById('room-guests').textContent = `${d.guests} guests`;
        
        document.getElementById('mobile-price').textContent = `$${d.price}`;
        document.getElementById('side-price').textContent = d.price;

        const amGrid = document.getElementById('amenities-list');
        d.amenities.forEach(am => {
          amGrid.innerHTML += `<div class="amenity-item"><span class="material-symbols-outlined amenity-icon">check</span><span class="amenity-name">${am}</span></div>`;
        });
      }
    }
    loadRoom();
  </script>
</body>
</html>
