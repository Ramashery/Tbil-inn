<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room — Tbil Inn</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav><a href="index.html">← Back</a></nav>

  <header class="room-hero">
    <img id="room-img" src="" alt="">
    <h1 id="room-name">...</h1>
  </header>

  <main class="room-content">
    <div class="meta">
      <span id="room-area"></span> | <span id="room-bed"></span>
    </div>
    <p id="room-desc" class="description">...</p>
    <div class="amenities" id="room-amenities"></div>
    
    <div class="booking-box">
        <span id="room-price"></span>
        <button>Book Now</button>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = { /* Тот же конфиг */ };
    const db = getFirestore(initializeApp(firebaseConfig));
    const lang = localStorage.getItem('tbil-lang') || 'en';
    const roomId = new URLSearchParams(window.location.search).get('id');

    async function load() {
      const snap = await getDoc(doc(db, "rooms", roomId));
      if(snap.exists()) {
        const r = snap.data();
        const t = r.langs[lang];
        document.getElementById('room-name').textContent = t.name;
        document.getElementById('room-desc').textContent = t.desc;
        document.getElementById('room-img').src = r.cover;
        document.getElementById('room-area').textContent = r.area + ' m²';
        document.getElementById('room-bed').textContent = r.bed;
        document.getElementById('room-price').textContent = '$' + r.price;
        
        const am = document.getElementById('room-amenities');
        r.amenities.forEach(a => { am.innerHTML += `<span>${a}</span>`; });
      }
    }
    load();
  </script>
</body>
</html>
