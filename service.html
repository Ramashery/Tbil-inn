<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service — Tbil Inn</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav><a href="index.html">← Back</a></nav>

  <header class="service-hero">
    <img id="svc-img" src="" alt="">
    <h1 id="svc-name">...</h1>
  </header>

  <main class="content">
    <p id="svc-short" class="subtitle">...</p>
    <div id="svc-full">...</div>
    <div class="price-tag" id="svc-price"></div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = { /* Тот же конфиг */ };
    const db = getFirestore(initializeApp(firebaseConfig));
    const lang = localStorage.getItem('tbil-lang') || 'en';
    const svcId = new URLSearchParams(window.location.search).get('id');

    async function load() {
      const snap = await getDoc(doc(db, "services", svcId));
      if(snap.exists()) {
        const s = snap.data();
        const t = s.langs[lang];
        document.getElementById('svc-name').textContent = t.name;
        document.getElementById('svc-short').textContent = t.short;
        document.getElementById('svc-full').textContent = t.desc;
        document.getElementById('svc-img').src = s.cover;
        document.getElementById('svc-price').textContent = s.price;
      }
    }
    load();
  </script>
</body>
</html>
