<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Service — Tbil Inn</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  
  <section class="service-hero">
    <img id="svc-cover" src="" alt="">
    <div class="overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title" id="svc-title">Loading...</h1>
      <span class="hero-subtitle" id="svc-cat"></span>
    </div>
  </section>

  <main>
    <div class="page-container">
      <div class="content-col">
        <div>
          <span class="section-label" id="svc-short"></span>
          <p class="text-detail" id="svc-desc"></p>
        </div>

        <div class="service-menu mt-8">
          <h2 class="section-head">What's included</h2>
          <p id="svc-includes" style="white-space: pre-wrap; color: var(--warm-gray); line-height: 1.8;"></p>
        </div>
      </div>

      <aside class="sidebar-col">
        <div class="sidebar-card">
          <h3 class="sidebar-title">Details</h3>
          <p><strong>Price:</strong> <span id="svc-price"></span></p>
          <p><strong>Duration:</strong> <span id="svc-duration"></span></p>
          <p><strong>Availability:</strong> <span id="svc-avail"></span></p>
          <button class="btn-block mt-4" onclick="alert('Contact: ' + document.getElementById('svc-booking').textContent)">Book</button>
          <span id="svc-booking" style="display:none;"></span>
        </div>
      </aside>
    </div>
  </main>

  <script type="module">
    import { db, doc, getDoc, currentLang } from './main.js';

    const params = new URLSearchParams(window.location.search);
    const svcId = params.get('id');

    async function loadService() {
      if (!svcId) return;
      const snap = await getDoc(doc(db, "services", svcId));

      if (snap.exists()) {
        const data = snap.data();
        const t = data.langs[currentLang];

        document.title = `${t.name} — Tbil Inn`;
        document.getElementById('svc-cover').src = data.cover;
        document.getElementById('svc-title').textContent = t.name;
        document.getElementById('svc-cat').textContent = data.category;
        
        document.getElementById('svc-short').textContent = t.short;
        document.getElementById('svc-desc').textContent = t.desc;
        document.getElementById('svc-includes').textContent = t.includes;

        document.getElementById('svc-price').textContent = data.price;
        document.getElementById('svc-duration').textContent = data.duration;
        document.getElementById('svc-avail').textContent = data.availability;
        document.getElementById('svc-booking').textContent = data.booking;
      }
    }
    loadService();
  </script>
</body>
</html>
