<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tbil Inn</title>
  <script>
  (function () {
    /*
      GitHub Pages SPA routing for Tbil Inn
      ─────────────────────────────────────
      Incoming URL examples (GitHub Pages serves this 404.html for all missing paths):

        /Tbil-inn/rooms/the-courtyard-suite/
        /Tbil-inn/services/old-town-spa/

      Strategy: redirect to the template file, passing the slug as a
      URL query param  ?slug=the-courtyard-suite  so there is ZERO
      dependency on sessionStorage (which can be unreliable across
      same-origin navigations in some mobile browsers).

      Template files that must exist in the repo:
        rooms/index.html     ← reads ?slug=
        services/index.html  ← reads ?slug=
    */

    var path  = window.location.pathname;   // e.g. /Tbil-inn/rooms/the-courtyard-suite
    var host  = window.location.hostname;

    // Detect repo base-path on GitHub Pages  →  "/Tbil-inn"
    var base = '';
    if (host.endsWith('github.io')) {
      var firstSeg = path.split('/').filter(Boolean)[0];
      if (firstSeg) base = '/' + firstSeg;
    }

    // Strip base from path  →  "/rooms/the-courtyard-suite"
    var rel = path.slice(base.length).replace(/\/$/, ''); // trim trailing slash

    // Extract type and slug
    // rel looks like:  /rooms/the-courtyard-suite
    //                  /services/old-town-spa
    var m = rel.match(/^\/(rooms|services)\/(.+)$/);

    if (m) {
      var type = m[1];   // "rooms" or "services"
      var slug = m[2];   // "the-courtyard-suite"
      // Redirect to the template, slug in query string
      window.location.replace(base + '/' + type + '/index.html?slug=' + encodeURIComponent(slug));
    } else {
      // Not a room/service URL — go home
      window.location.replace(base + '/');
    }
  })();
  </script>
</head>
<body></body>
</html>
