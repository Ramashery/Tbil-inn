<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tbil Inn — Tbilisi, Georgia</title>
  <link rel="stylesheet" href="https://unpkg.com/flickity@2/dist/flickity.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- DESKTOP NAV -->
  <nav id="main-nav">
    <a href="#hero" class="nav-logo">Tbil Inn</a>
    <ul class="nav-links">
      <li><a href="#rooms">Rooms</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#gallery">Gallery</a></li>
      <li><a href="#contacts">Contacts</a></li>
      <!-- Селектор языка -->
      <li>
        <select onchange="changeLanguage(this.value)" id="lang-selector" style="background:transparent; color:inherit; border:none; outline:none; cursor:pointer; font-family:'Jost'; font-size: 0.7rem; text-transform:uppercase; letter-spacing:0.2em;">
          <option value="en" style="color:#000;">EN</option>
          <option value="ru" style="color:#000;">RU</option>
          <option value="ka" style="color:#000;">KA</option>
        </select>
      </li>
    </ul>
    <a href="#contacts" class="nav-cta">Book Now</a>
  </nav>

  <!-- MOBILE HEADER -->
  <header class="mobile-header" id="mobile-header">
    <span class="mobile-logo">Tbil Inn</span>
    <button class="mobile-hamburger" onclick="toggleMobileMenu()">
      <span class="line-1"></span><span class="line-2"></span>
    </button>
  </header>

  <!-- MOBILE MENU -->
  <div class="mobile-menu-overlay" id="mobile-menu-overlay">
    <div class="mobile-menu-top">
      <span class="mobile-logo">Tbil Inn</span>
      <button class="mobile-close" onclick="toggleMobileMenu()"><span class="material-symbols-outlined">close</span></button>
    </div>
    <nav class="mobile-menu-nav">
      <a href="#rooms" onclick="toggleMobileMenu()">Rooms</a>
      <a href="#services" onclick="toggleMobileMenu()">Services</a>
      <a href="#gallery" onclick="toggleMobileMenu()">Gallery</a>
      <a href="#contacts" onclick="toggleMobileMenu()">Contacts</a>
      <!-- Мобильный селектор языка -->
      <div style="margin-top:20px;">
        <select onchange="changeLanguage(this.value)" id="mobile-lang-selector" style="font-family:'Jost'; font-size:1rem; padding:5px; border:1px solid #ccc;">
          <option value="en">English</option>
          <option value="ru">Русский</option>
          <option value="ka">ქართული</option>
        </select>
      </div>
    </nav>
  </div>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-slider" id="hero-carousel">
      <!-- Заполняется из JS -->
    </div>
  </section>

  <!-- ROOMS -->
  <section id="rooms" class="drag-section">
    <div class="section-header fade-in">
      <span class="section-label">Accommodations</span>
      <h2 class="section-title">Our Rooms</h2>
      <div class="section-divider"></div>
    </div>
    <div class="drag-track-container">
      <div class="image-track" id="rooms-track">
        <!-- Заполняется из JS -->
      </div>
    </div>
    <p class="drag-hint">Drag to explore</p>
  </section>

  <!-- SERVICES -->
  <section id="services" class="drag-section" style="background:var(--sand);">
    <div class="section-header fade-in">
      <span class="section-label">What We Offer</span>
      <h2 class="section-title">Services</h2>
      <div class="section-divider"></div>
    </div>
    <div class="drag-track-container">
      <div class="image-track" id="services-track">
         <!-- Заполняется из JS -->
      </div>
    </div>
    <p class="drag-hint">Drag to explore</p>
  </section>

  <footer>
    <span class="footer-logo">Tbil Inn</span>
    <span>© 2025 Tbil Inn · Tbilisi, Georgia</span>
  </footer>

  <script src="https://unpkg.com/flickity@2/dist/flickity.pkgd.min.js"></script>
  
  <script type="module">
    import { db, collection, getDocs, doc, getDoc, currentLang } from './main.js';

    // Установка языка в селекторах
    document.getElementById('lang-selector').value = currentLang;
    document.getElementById('mobile-lang-selector').value = currentLang;

    // Глобальные функции меню и скролла (перенес из старого файла)
    window.toggleMobileMenu = function() {
      var menu = document.getElementById('mobile-menu-overlay');
      var isOpen = menu.classList.contains('open');
      menu.classList.toggle('open', !isOpen);
      document.body.style.overflow = isOpen ? '' : 'hidden';
    };

    var nav = document.getElementById('main-nav');
    var mobileHeader = document.getElementById('mobile-header');
    window.addEventListener('scroll', function() {
      if (nav) nav.classList.toggle('scrolled', window.scrollY > 60);
      if (mobileHeader) {
        if (window.scrollY <= 10) {
          mobileHeader.style.background = 'transparent';
          mobileHeader.style.borderBottom = 'none';
        } else {
          mobileHeader.style.background = 'rgba(249, 246, 241, 0.8)';
          mobileHeader.style.borderBottom = '1px solid rgba(0,0,0,0.05)';
        }
      }
    });

    // Функция инициализации перетаскивания (Drag Track)
    function initDragTrack(trackId) {
      var track = document.getElementById(trackId);
      if (!track) return;
      var isDown = false, startX = 0, currentPx = 0, startPx = 0;
      function applyTranslate(px) {
        currentPx = Math.max(-Math.max(0, track.scrollWidth - track.parentElement.offsetWidth + 64), Math.min(0, px));
        track.style.transform = 'translateX(' + currentPx + 'px)';
      }
      function getClientX(e) { return e.clientX !== undefined ? e.clientX : (e.touches ? e.touches[0].clientX : null); }
      track.addEventListener('mousedown', function(e) {
        var cx = getClientX(e); if (!cx) return;
        isDown = true; startX = cx; startPx = currentPx; track.style.cursor = 'grabbing'; track.style.transition = 'none';
      });
      window.addEventListener('mouseup', function() { isDown = false; track.style.cursor = 'grab'; track.style.transition = 'transform 0.35s ease'; });
      window.addEventListener('mousemove', function(e) { if (!isDown) return; applyTranslate(startPx + (getClientX(e) - startX)); });
    }

    // ЗАГРУЗКА ДАННЫХ
    async function loadContent() {
      try {
        // 1. Слайдер
        const hpDoc = await getDoc(doc(db, "siteContent", "homepage"));
        const carousel = document.getElementById('hero-carousel');
        if (hpDoc.exists()) {
          const slides = hpDoc.data().heroSlides;
          slides.forEach(slide => {
            const title = slide.langs[currentLang]?.title || "Tbil Inn";
            carousel.innerHTML += `
              <div class="carousel-cell" style="background-image:url('${slide.img}');">
                <div class="overlay"></div>
                <div class="inner">
                  <h1 class="title">${title}</h1>
                  <a href="#rooms" class="btn">Discover Our Rooms</a>
                </div>
              </div>`;
          });
        }
        // Запуск Flickity после рендера HTML
        new Flickity(carousel, { autoPlay: 5500, wrapAround: true, pageDots: true });

        // 2. Комнаты
        const roomsSnap = await getDocs(collection(db, "rooms"));
        const roomsTrack = document.getElementById('rooms-track');
        roomsSnap.forEach(snap => {
          const r = snap.data();
          if (r.status !== 'live') return;
          const t = r.langs[currentLang];
          roomsTrack.innerHTML += `
            <div class="card-room-new">
              <img src="${r.cover}" draggable="false">
              <div class="card-body">
                <span class="card-category">${r.bed}</span>
                <h3 class="card-title">${t.name}</h3>
                <p class="card-desc">${t.desc}</p>
              </div>
              <div class="card-footer">
                <span class="card-price">From $${r.price}</span>
                <a class="card-link" href="room.html?id=${snap.id}">Explore</a>
              </div>
            </div>`;
        });
        initDragTrack('rooms-track');

        // 3. Сервисы
        const svcSnap = await getDocs(collection(db, "services"));
        const svcTrack = document.getElementById('services-track');
        svcSnap.forEach(snap => {
          const s = snap.data();
          if (s.status !== 'live') return;
          const t = s.langs[currentLang];
          svcTrack.innerHTML += `
            <a href="service.html?id=${snap.id}" class="service-card">
              <div class="service-card-img"><img src="${s.cover}" draggable="false"></div>
              <div class="service-card-body">
                <span class="service-card-cat">${s.category}</span>
                <h3 class="service-card-title">${t.name}</h3>
                <p class="service-card-desc">${t.short}</p>
                <span class="service-card-link">Explore</span>
              </div>
            </a>`;
        });
        initDragTrack('services-track');

      } catch(e) { console.error("Ошибка загрузки БД", e); }
    }

    loadContent();
  </script>
</body>
</html>
