<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tbil Inn — Tbilisi, Georgia</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" />
</head>
<body>

  <nav id="main-nav">
    <a href="/" class="nav-logo">Tbil Inn</a>
    <ul class="nav-links">
      <li><a href="#rooms" data-t="nav_rooms">Rooms</a></li>
      <li><a href="#services" data-t="nav_services">Services</a></li>
      <li><a href="#contacts" data-t="nav_contact">Contact</a></li>
    </ul>
    <div class="lang-switcher">
        <button onclick="changeLang('en')">EN</button>
        <button onclick="changeLang('ru')">RU</button>
        <button onclick="changeLang('ka')">GE</button>
    </div>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-inner">
      <h1 id="hero-title" class="title">...</h1>
      <a href="#rooms" class="btn" data-t="hero_btn">Discover</a>
    </div>
  </section>

  <!-- ROOMS -->
  <section id="rooms" class="drag-section">
    <div class="section-header">
      <h2 class="section-title" data-t="nav_rooms">Our Rooms</h2>
    </div>
    <div class="drag-track-container">
      <div class="image-track" id="rooms-list">
        <!-- Данные загрузятся сюда -->
      </div>
    </div>
  </section>

  <!-- SERVICES -->
  <section id="services" class="drag-section">
    <div class="section-header">
      <h2 class="section-title" data-t="nav_services">Services</h2>
    </div>
    <div class="drag-track-container">
      <div class="image-track" id="services-list">
        <!-- Данные загрузятся сюда -->
      </div>
    </div>
  </section>

  <!-- CONTACTS -->
  <footer id="contacts">
    <div class="contact-info">
      <h2 id="footer-addr">...</h2>
      <p id="footer-mail">...</p>
      <p id="footer-phone">...</p>
    </div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB8CuIy_VVIOpXLYtscG366KoEqOJOVt1w",
      authDomain: "tbil-inn.firebaseapp.com",
      projectId: "tbil-inn",
      storageBucket: "tbil-inn.firebasestorage.app",
      messagingSenderId: "460166841090",
      appId: "1:460166841090:web:371dffb9c9c1d314c2381b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const lang = localStorage.getItem('tbil-lang') || 'en';

    window.changeLang = (l) => { localStorage.setItem('tbil-lang', l); location.reload(); };

    async function init() {
      // 1. Загрузка контента главной
      const hp = await getDoc(doc(db, "siteContent", "homepage"));
      if(hp.exists()) {
        document.getElementById('hero-title').textContent = hp.data().heroSlides[0].langs[lang].title;
      }

      // 2. Загрузка комнат
      const rSnap = await getDocs(collection(db, "rooms"));
      const rList = document.getElementById('rooms-list');
      rSnap.forEach(s => {
        const r = s.data();
        if(r.status === 'live') {
          rList.innerHTML += `
            <div class="card-room-new">
              <img src="${r.cover}">
              <div class="card-body">
                <h3>${r.langs[lang].name}</h3>
                <p>${r.langs[lang].sub}</p>
                <a href="room.html?id=${s.id}">Explore</a>
              </div>
            </div>`;
        }
      });

      // 3. Загрузка сервисов
      const sSnap = await getDocs(collection(db, "services"));
      const sList = document.getElementById('services-list');
      sSnap.forEach(s => {
        const sv = s.data();
        if(sv.status === 'live') {
          sList.innerHTML += `
            <a href="service.html?id=${s.id}" class="service-card">
              <img src="${sv.cover}">
              <h3>${sv.langs[lang].name}</h3>
            </a>`;
        }
      });

      // 4. Контакты
      const c = await getDoc(doc(db, "siteContent", "contacts"));
      if(c.exists()) {
        const d = c.data();
        document.getElementById('footer-addr').textContent = d.address;
        document.getElementById('footer-mail').textContent = d.email;
        document.getElementById('footer-phone').textContent = d.phone;
      }
    }
    init();
  </script>
</body>
</html>
