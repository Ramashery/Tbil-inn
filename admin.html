<body class="bg-[#F9F8F3] font-sans">

<!-- HEADER & NAV (Оставляем как в вашем макете) -->
<!-- ... -->

<main class="max-w-3xl mx-auto px-4 py-10">
    <!-- СекцииHomepage, Rooms, Services - всё как в вашем макете -->
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB8CuIy_VVIOpXLYtscG366KoEqOJOVt1w",
        authDomain: "tbil-inn.firebaseapp.com",
        projectId: "tbil-inn",
        storageBucket: "tbil-inn.firebasestorage.app",
        messagingSenderId: "460166841090",
        appId: "1:460166841090:web:371dffb9c9c1d314c2381b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- ФУНКЦИИ КОМНАТ ---
    window.saveRoom = async function() {
        const id = document.getElementById('re-code').value || `room-${Date.now()}`;
        const roomData = {
            status: document.getElementById('room-status').value,
            price: Number(document.getElementById('re-price').value),
            area: Number(document.getElementById('re-area').value),
            guests: Number(document.getElementById('re-guests').value),
            bed: document.getElementById('re-bed').value,
            code: id,
            cover: document.getElementById('re-cover').value,
            langs: {
                en: { name: document.getElementById('re-name-en').value, sub: document.getElementById('re-sub-en').value, desc: document.getElementById('re-desc-en').value },
                ru: { name: document.getElementById('re-name-ru').value, sub: document.getElementById('re-sub-ru').value, desc: document.getElementById('re-desc-ru').value },
                ka: { name: document.getElementById('re-name-ka').value, sub: document.getElementById('re-sub-ka').value, desc: document.getElementById('re-desc-ka').value }
            }
        };
        await setDoc(doc(db, "rooms", id), roomData);
        alert("Saved!");
        location.reload();
    };

    // --- ЗАГРУЗКА СПИСКА КОМНАТ ---
    async function loadRooms() {
        const snap = await getDocs(collection(db, "rooms"));
        const list = document.getElementById('rooms-list');
        list.innerHTML = "";
        snap.forEach(d => {
            const r = d.data();
            list.innerHTML += `<div class="p-4 bg-white mb-2 border rounded flex justify-between items-center">
                <span>${r.langs.en.name} (${r.status})</span>
                <button onclick="editRoom('${d.id}')" class="text-gold">Edit</button>
            </div>`;
        });
    }

    // При старте
    loadRooms();
</script>
</body>
</html>
